character_encoding:
  status: "confirmed_for_7seg_and_operationally_confirmed_for_14seg"
  digit_7seg:
    description: "Canonical encoding for numeric rows"
    encodings:
      " ": []
      "-": [D]
      "0": [A, B, C, E, F, G]
      "1": [C, F]
      "2": [A, B, D, F, G]
      "3": [A, C, D, F, G]
      "4": [C, D, E, F]
      "5": [A, C, D, E, G]
      "6": [A, B, C, D, E, G]
      "7": [C, F, G]
      "8": [A, B, C, D, E, F, G]
      "9": [C, D, E, F, G]
      "A": [B, C, D, E, F, G]
      "E": [A, B, D, E, G]
      "L": [A, B, E]
      "O": [A, B, C, E, F, G]
      "P": [B, D, E, F, G]
      "S": [A, C, D, E, G]
      "U": [A, B, C, E, F]
      "_": [A]
    remarks:
      - "Encoding above reflects currently proven behavior, not IEC or ANSI naming"
      - "Geometric labels follow the artwork convention, not the most common calculator convention"
  digit_14seg:
    status: "operational"
    note: "Legacy firmware demonstrates successful rendering of many alphanumeric characters"
    recommendation: "Future driver should use explicit per-character bitmap tables after A..N naming is finalized"

firmware_abstraction_recommendation:
  status: "recommended"
  philosophy:
    - "Expose a clean logical API independent of register layout"
    - "Keep visible ordering stable even if future glass routing changes"
    - "Represent all physical segments internally as canonical (com, seg) endpoints"
  public_api_model:
    pixels:
      - "lcd_set_pixel(com, seg, on)"
      - "lcd_get_pixel(com, seg)"
    numeric_rows:
      - "lcd_set_line1_digit(index, char)"
      - "lcd_set_line2_digit(index, char)"
      - "lcd_set_line1_dp(index, on)"
      - "lcd_set_line2_dp(index, on)"
    alphanumeric:
      - "lcd_set_alpha_digit(index, char)"
    symbols:
      - "lcd_set_symbol(symbol_id, on)"
    bulk:
      - "lcd_clear()"
      - "lcd_fill()"
      - "lcd_flush()"
  internal_data_model:
    - "Shadow RAM buffer of 20 bytes"
    - "Mapping layer from logical element to {reg, bit} or {com, seg}"
    - "Optional unit-testable renderer isolated from bus driver"

production_test_recommendation:
  status: "recommended"
  goals:
    - "Detect open/short glass routing"
    - "Validate next LCD revision without legacy firmware dependence"
  one_hot_tests:
    - "Sweep every register bit individually"
    - "Capture human-readable mapping table of visible response"
    - "For 14-segment digits, record A..N identity with annotated images"
  grouped_tests:
    - "All segments off"
    - "All segments on"
    - "Line 1 8s with all decimal points on"
    - "Line 2 8s with all decimal points on"
    - "Alpha digits showing A, H, N, M, X, 2, 8"
    - "All standalone symbols on"
  deliverables:
    - "Photographic reference per test pattern"
    - "CSV or YAML export of verified mappings"

known_gaps:
  status: "explicit"
  items:
    - id: "14seg_A_to_N_naming"
      status: "unresolved"
      impact: "Future alphanumeric driver may rely on legacy lookup tables unless segment names are finalized"
      mitigation: "Perform segment-by-segment validation and add explicit naming table"
    - id: "controller_init_details"
      status: "out_of_scope"
      impact: "This document describes the display, not bus initialization timing"
      mitigation: "Keep controller init in a separate controller-specific spec"

traceability:
  derived_from:
    - item: "User-provided COM/SEG register table"
      purpose: "Canonical RAM map"
    - item: "LCD artwork with segment coloring and labels"
      purpose: "Visual grouping and geometric naming"
    - item: "ENH-SS024197-01-YFPHGN-1 routing PDF"
      purpose: "Glass-side COM colors and controller-side to glass-side COM0/COM1 translation note"
    - item: "Vendor mechanical/layout PDFs"
      purpose: "Physical organization and module dimensions"
    - item: "Legacy functional low-level driver"
      purpose: "Confirmed logical groupings, proven symbol mappings, and parametric digit routing"
  confidence_summary:
    ram_map: "high"
    controller_to_glass_com_translation: "high"
    numeric_row_mapping: "high"
    symbol_mapping: "high"
    decimal_points: "high"
    14seg_presence_and_electrode_sets: "high"
    14seg_A_to_N_names: "medium/insufficient"

usage_notes:
  for_new_driver:
    - "Use this spec as the source of truth"
    - "Do not copy legacy public API or naming unless needed for backward compatibility"
    - "Prefer visible-order indices in application-facing functions"
  for_next_lcd_revision:
    - "Preserve logical IDs even if physical COM/SEG routing changes"
    - "Update only mapping sections when artwork changes"
    - "Add revision field and keep prior mappings archived"
  for_document_control:
    - "Store this file in source control next to firmware and hardware documentation"
    - "Freeze a verified version after production validation"

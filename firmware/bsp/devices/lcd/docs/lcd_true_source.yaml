      - "This closes the segment-shape vocabulary, but not yet every reg/bit to segment assignment"

numeric_row_mapping:
  status: "confirmed"
  purpose: "Parametric mapping for all 7-segment numeric digits"
  policy:
    description: "Each digit is derived from a base mapping plus a column stride"
    stride_in_bit_positions_per_digit: 2
    note: "This is a structural property of the glass/controller routing"
  line_1:
    status: "confirmed"
    visible_order_left_to_right:
      - L1_D0
      - L1_D1
      - L1_D2
      - L1_D3
      - L1_D4
      - L1_D5
      - L1_D6
      - L1_D7
    formula:
      input:
        digit_index: "0..7, left to right"
        logical_segment: "A..G or DP"
      process:
        - "lookup base entry for logical_segment"
        - "base_pos = base.bit"
        - "base_reg = base.reg"
        - "pos = base_pos + digit_index * 2"
        - "reg = base_reg + floor(pos / 8)"
        - "bit = pos % 8"
      output: "{reg, bit}"
    base_segments:
      A:  {reg: 7,  bit: 6}
      B:  {reg: 2,  bit: 6}
      C:  {reg: 2,  bit: 7}
      D:  {reg: 17, bit: 6}
      E:  {reg: 12, bit: 6}
      F:  {reg: 17, bit: 7}
      G:  {reg: 12, bit: 7}
      DP: {reg: 7,  bit: 7}
  line_2:
    status: "confirmed"
    visible_order_left_to_right:
      - L2_D0
      - L2_D1
      - L2_D2
      - L2_D3
      - L2_D4
      - L2_D5
      - L2_D6
    formula:
      input:
        digit_index: "0..6, left to right"
        logical_segment: "A..G or DP"
      process:
        - "internal_index = 6 - digit_index"
        - "lookup base entry for logical_segment"
        - "base_pos = base.bit"
        - "base_reg = base.reg"
        - "pos = base_pos + internal_index * 2"
        - "reg = base_reg + floor(pos / 8)"
        - "bit = pos % 8"
      output: "{reg, bit}"
    base_segments:
      A:  {reg: 5,  bit: 7}
      B:  {reg: 0,  bit: 7}
      C:  {reg: 0,  bit: 6}
      D:  {reg: 15, bit: 7}
      E:  {reg: 10, bit: 7}
      F:  {reg: 15, bit: 6}
      G:  {reg: 10, bit: 6}
      DP: {reg: 5,  bit: 6}
    important_note:
      - "Visible left-to-right order is inverse of the internal base progression"
      - "Any future driver shall preserve visible-order addressing in its public API"


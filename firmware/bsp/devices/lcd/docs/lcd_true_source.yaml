  electrode_model:
    description: "Each visible segment is identified by one COM electrode and one SEG electrode"
    canonical_pixel_identifier: "(com, seg)"
    rule: "A physical LCD segment is ON when the corresponding COM/SEG waveform pair is driven according to the controller state"
  common_naming_convention:
    status: "confirmed_with_translation_note"
    description: "The vendor artwork and the controller-facing RAM model do not use the same COM numbering for all lines"
    controller_side:
      note: "This is the numbering used by the recovered PCF8553 RAM map and by reg/bit formulas in this document"
      com_order:
        - COM0
        - COM1
        - COM2
        - COM3
    glass_side:
      note: "This is the numbering and color convention shown in the LCD routing artwork"
      color_reference:
        COM0: "green"
        COM1: "yellow"
        COM2: "blue"
        COM3: "red"
    controller_to_glass_mapping:
      COM0: COM1
      COM1: COM0
      COM2: COM2
      COM3: COM3
    engineering_note:
      - "When comparing artwork colors against reg/bit controller mappings, translate controller-side COM numbering to glass-side COM numbering first"
      - "This COM0/COM1 exchange is important for interpreting the 14-segment artwork and should not be silently collapsed"
  memory_model:
    description: "Controller memory is modeled as 20 registers x 8 bits = 160 controllable segment states"
    register_count: 20
    bits_per_register: 8
    register_names:
      - REG_0
      - REG_1
      - REG_2
      - REG_3
      - REG_4
      - REG_5
      - REG_6
      - REG_7
      - REG_8
      - REG_9

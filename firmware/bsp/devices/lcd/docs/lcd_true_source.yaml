      - REG_11
      - REG_12
      - REG_13
      - REG_14
      - REG_15
      - REG_16
      - REG_17
      - REG_18
      - REG_19

ram_map:
  status: "confirmed"
  description: "Canonical relationship between controller RAM, COM lines, and SEG lines"
  canonical_formula:
    reg: "com * 5 + floor(seg / 8)"
    bit: "seg % 8"
  inverse_formula:
    com: "floor(reg / 5)"
    seg: "(reg % 5) * 8 + bit"
  bit_order_policy:
    description: "Bit 0 corresponds to lowest SEG index in the 8-segment block"
    examples:
      - "REG_0 BIT_0 -> COM0 SEG0"
      - "REG_0 BIT_7 -> COM0 SEG7"
      - "REG_4 BIT_0 -> COM0 SEG32"
      - "REG_19 BIT_7 -> COM3 SEG39"
  registers:
    - reg: 0
      com: 0
      seg_range: [0, 7]
      bits:
        0: SEG0
        1: SEG1
        2: SEG2
        3: SEG3
        4: SEG4
        5: SEG5
        6: SEG6
        7: SEG7
    - reg: 1
      com: 0
      seg_range: [8, 15]
      bits:
        0: SEG8
        1: SEG9
        2: SEG10
        3: SEG11
        4: SEG12
        5: SEG13
        6: SEG14
        7: SEG15
    - reg: 2
      com: 0
      seg_range: [16, 23]
      bits:
        0: SEG16
        1: SEG17
        2: SEG18
        3: SEG19
        4: SEG20
        5: SEG21
        6: SEG22
        7: SEG23
    - reg: 3
      com: 0

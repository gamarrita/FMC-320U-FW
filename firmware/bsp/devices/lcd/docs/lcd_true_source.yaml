alphanumeric_14seg_mapping:
  status: "partially_confirmed"
  description: "Two visible 14-segment characters are present and actively driven in available firmware"
  visible_digits:
    - id: ALPHA_D0
      visible_label: 8
    - id: ALPHA_D1
      visible_label: 9
  confirmed_facts:
    - "Both characters are controlled independently from numeric rows"
    - "Both characters support a wide subset of ASCII alphanumerics"
    - "Each character uses 14 physical segments"
  engineering_note:
    - "The available firmware proves functional control of the 14-segment characters"
    - "The artwork now confirms the geometric meaning of A..N"
    - "The vendor routing drawing also confirms a controller-side to glass-side COM0/COM1 exchange"
    - "However, the direct one-to-one naming A..N to each reg/bit is still not fully reconstructable with zero ambiguity from present evidence alone"
  recovered_electrode_sets:
    ALPHA_D0:

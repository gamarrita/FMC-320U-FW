document:
  title: "Custom segmented LCD engineering specification"
  document_type: "embedded_hardware_interface_spec"
  version: "1.1"
  status: "working baseline"
  intent:
    - "Single source of truth for firmware, validation, and future LCD revisions"
    - "Independent from any specific legacy driver implementation"
    - "Usable for driver generation, board bring-up, production test, and LCD redesign review"
  language: "en"
  authoring_style: "engineering"
  assumptions_policy:
    rule: "If a fact is not directly supported by available evidence, mark it as inferred or unresolved"
    statuses:
      - "confirmed"
      - "inferred"
      - "unresolved"

display:
  product_name: "Custom segmented LCD for flow/volume instrument"
  glass_model_reference:
    - "FMC-160LDC"
    - "ENH-SS024197-01"
  technology: "passive multiplexed segmented LCD"
  controller_family: "PCF8553-compatible memory map expected"
  electrical_topology:
    com_count: 4
    seg_count: 40
    total_segments: 160
    mux: "1/4 duty"
    bias:
      value: "1/3 bias"
      status: "inferred"
      rationale: "Consistent with 4 COM segmented LCD arrangement and vendor sheet style"
  panel_function:
    summary: "Multi-zone segmented LCD with numeric rows, two alphanumeric 14-segment characters, decimal markers, and dedicated status symbols"
  evidence:
    mechanical_and_layout_pdf: "bsp/devices/lcd/docs/ENH-SS024197-01-YFPHGN-1.pdf"
    artwork_with_segment_names: "Available"
    routing_artwork_with_com_colors: "Available"
    legacy_functional_driver: "Available"

mechanical:
  status: "confirmed"
  source_summary:
    - "Vendor PDF provides overall dimensions, viewing area, pin pitch, and backlight dimensions"
    - "Artwork PDF shows physical placement of numeric fields and symbols"
  dimensions_mm:
    module_width: 64
    module_height: 33
    visible_area_width: 61
    visible_area_height: 30
    backlight_width: 69
    backlight_height: 33
    thickness: 12
    backlight_tail_length: 50
  notes:
    - "Values above are derived from uploaded mechanical/artwork documentation"
    - "Use vendor PDF as manufacturing reference, not firmware reference"
  references:
    - "FMC-160LDC artwork and dimensions"
    - "ENH-SS024197-01 mechanical drawing"

